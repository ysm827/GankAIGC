name: Build Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag to upload assets to (e.g., v2.0.1)'
        required: true
        default: 'v2.0.1'
      postgres_zip_url:
        description: 'PostgreSQL Windows binaries ZIP URL for the one-click package'
        required: true
        default: 'https://get.enterprisedb.com/postgresql/postgresql-16.13-1-windows-x64-binaries.zip'

# Default permissions for all jobs
permissions:
  contents: read

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout requested tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.ref }}
          fetch-depth: 0

      - name: Verify tag and commit identity
        env:
          TAG_NAME: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          git show-ref --verify --quiet "refs/tags/$TAG_NAME"
          test "$(git rev-parse HEAD)" = "$(git rev-list -n 1 "$TAG_NAME")"

  build-windows:
    needs: validate-release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: package/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package/frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: package/frontend
        run: npm ci

      - name: Set package version
        id: package_version
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "dev-${{ github.sha }}"
          }
          Set-Content -Path "package\VERSION" -Value $version -Encoding UTF8
          "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build frontend
        working-directory: package/frontend
        env:
          VITE_APP_VERSION: ${{ steps.package_version.outputs.version }}
        run: npm run build

      - name: Copy frontend build to static
        working-directory: package
        run: |
          if (Test-Path "static") { Remove-Item -Recurse -Force static }
          Copy-Item -Recurse frontend\dist static
        shell: pwsh

      - name: Build with PyInstaller
        working-directory: package
        run: pyinstaller app.spec --clean

      - name: Get version
        id: version
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            echo "version=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            echo "version=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            echo "version=dev-${{ github.sha }}" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Create zip archive
        working-directory: package
        run: |
          Compress-Archive -Path "dist\GankAIGC.exe" -DestinationPath "GankAIGC-Windows.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GankAIGC-Windows
          path: package/GankAIGC-Windows.zip
          retention-days: 30

      - name: Build Windows one-click package
        working-directory: package
        run: |
          $postgresZipUrl = "${{ github.event.inputs.postgres_zip_url }}"
          if ([string]::IsNullOrWhiteSpace($postgresZipUrl)) {
            $postgresZipUrl = "https://get.enterprisedb.com/postgresql/postgresql-16.13-1-windows-x64-binaries.zip"
          }
          .\build-oneclick.ps1 -SkipExeBuild -PostgresZipUrl $postgresZipUrl -CreateZip
        shell: pwsh

      - name: Upload one-click artifact
        uses: actions/upload-artifact@v4
        with:
          name: GankAIGC-Windows-OneClick
          path: package/dist/GankAIGC-Windows-OneClick.zip
          retention-days: 30

  build-linux:
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: package/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package/frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: package/frontend
        run: npm ci

      - name: Set package version
        id: package_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            version="${{ github.ref_name }}"
          else
            version="dev-${{ github.sha }}"
          fi
          printf '%s\n' "$version" > package/VERSION
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build frontend
        working-directory: package/frontend
        env:
          VITE_APP_VERSION: ${{ steps.package_version.outputs.version }}
        run: npm run build

      - name: Copy frontend build to static
        working-directory: package
        run: |
          rm -rf static
          cp -r frontend/dist static

      - name: Build with PyInstaller
        working-directory: package
        run: pyinstaller app.spec --clean

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Create tar archive
        working-directory: package
        run: |
          tar -czvf "GankAIGC-Linux.tar.gz" -C dist "GankAIGC"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GankAIGC-Linux
          path: package/GankAIGC-Linux.tar.gz
          retention-days: 30

  build-macos:
    needs: validate-release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version || github.ref }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: package/requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package/frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: package
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: package/frontend
        run: npm ci

      - name: Set package version
        id: package_version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            version="${{ github.ref_name }}"
          else
            version="dev-${{ github.sha }}"
          fi
          printf '%s\n' "$version" > package/VERSION
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build frontend
        working-directory: package/frontend
        env:
          VITE_APP_VERSION: ${{ steps.package_version.outputs.version }}
        run: npm run build

      - name: Copy frontend build to static
        working-directory: package
        run: |
          rm -rf static
          cp -r frontend/dist static

      - name: Build with PyInstaller
        working-directory: package
        run: pyinstaller app.spec --clean

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Create tar archive
        working-directory: package
        run: |
          tar -czvf "GankAIGC-macOS.tar.gz" -C dist "GankAIGC"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GankAIGC-macOS
          path: package/GankAIGC-macOS.tar.gz
          retention-days: 30

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print0)
          printf 'Release tag: %s\n' "$TAG_NAME"
          printf 'Assets:\n'
          printf ' - %s\n' "${files[@]}"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            existing_assets="$(gh release view "$TAG_NAME" --json assets --jq '.assets[].name')"
            for file in "${files[@]}"; do
              asset_name="$(basename "$file")"
              if printf '%s\n' "$existing_assets" | grep -Fxq "$asset_name"; then
                echo "Refusing to overwrite immutable release asset: $asset_name" >&2
                exit 1
              fi
            done
            gh release upload "$TAG_NAME" "${files[@]}"
          else
            gh release create "$TAG_NAME" "${files[@]}" \
              --title "GankAIGC $TAG_NAME" \
              --notes "自动构建 Windows 一键整合包和普通 Windows/Linux/macOS 可执行包。"
          fi
