name: gankaigc

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}
    env_file:
      - .env.docker
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 9800
      APP_ENV: production
      AUTO_OPEN_BROWSER: "false"
      GANKAIGC_ENV_FILE: /app/config/.env.docker
      GANKAIGC_HOST_PROJECT_DIR: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}
      DATABASE_URL: postgresql://ai_polish:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}@postgres:5432/ai_polish
      INLINE_TASK_WORKER_ENABLED: "false"
    command: python main.py
    volumes:
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}/.env.docker
        target: /app/config/.env.docker
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}
        target: /app/source
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "${APP_PORT:-9800}:9800"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      AUTO_OPEN_BROWSER: "false"
      GANKAIGC_ENV_FILE: /app/config/.env.docker
      GANKAIGC_HOST_PROJECT_DIR: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}
      DATABASE_URL: postgresql://ai_polish:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}@postgres:5432/ai_polish
      INLINE_TASK_WORKER_ENABLED: "false"
      TASK_WORKER_ID: docker-worker-1
    command: python backend/worker.py
    volumes:
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}/.env.docker
        target: /app/config/.env.docker
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  updater:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DOCKER_IMAGE_PREFIX: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}
    env_file:
      - .env.docker
    environment:
      APP_ENV: production
      AUTO_OPEN_BROWSER: "false"
      GANKAIGC_ENV_FILE: /app/config/.env.docker
      GANKAIGC_HOST_PROJECT_DIR: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}
      DATABASE_URL: postgresql://ai_polish:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}@postgres:5432/ai_polish
      VPS_UPDATE_ENABLED: "true"
      VPS_UPDATE_WORKDIR: /app/source
      VPS_UPDATE_LOG_FILE: /app/source/logs/vps-update.log
    working_dir: /app/source
    command: >
      sh -lc "git pull --ff-only origin main &&
      docker compose --env-file .env.docker up --build -d app worker"
    volumes:
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}/.env.docker
        target: /app/config/.env.docker
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}
        target: /app/source
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - update
    restart: "no"

  postgres:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}library/postgres:16-alpine
    environment:
      POSTGRES_DB: ai_polish
      POSTGRES_USER: ai_polish
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_polish -d ai_polish"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backup:
    image: ${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}library/postgres:16-alpine
    env_file:
      - .env.docker
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ai_polish
      POSTGRES_USER: ai_polish
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.docker}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    command: sh /scripts/docker-postgres-backup.sh
    volumes:
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}/backups
        target: /backups
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}/scripts/docker-postgres-backup.sh
        target: /scripts/docker-postgres-backup.sh
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
