x-runtime-environment: &runtime-environment
  APP_ENV: production
  TZ: ${TZ:-Asia/Shanghai}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:9800}
  TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-127.0.0.1,::1}
  ALLOW_LOCAL_MODEL_PROXY: ${ALLOW_LOCAL_MODEL_PROXY:-false}
  ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
  MODEL_PROVIDER_NAME: ${MODEL_PROVIDER_NAME:-}
  MODEL_API_FORMAT: ${MODEL_API_FORMAT:-openai_chat}
  POLISH_MODEL: ${POLISH_MODEL:-gpt-5.5}
  POLISH_BASE_URL: ${POLISH_BASE_URL:-https://api.openai.com/v1}
  ENHANCE_MODEL: ${ENHANCE_MODEL:-gpt-5.5}
  ENHANCE_BASE_URL: ${ENHANCE_BASE_URL:-https://api.openai.com/v1}
  EMOTION_MODEL: ${EMOTION_MODEL:-gpt-5.5}
  EMOTION_BASE_URL: ${EMOTION_BASE_URL:-https://api.openai.com/v1}
  COMPRESSION_MODEL: ${COMPRESSION_MODEL:-gpt-5.5}
  COMPRESSION_BASE_URL: ${COMPRESSION_BASE_URL:-https://api.openai.com/v1}
  MAX_CONCURRENT_USERS: ${MAX_CONCURRENT_USERS:-7}
  API_REQUEST_INTERVAL: ${API_REQUEST_INTERVAL:-6}
  ENABLE_VERBOSE_AI_LOGS: ${ENABLE_VERBOSE_AI_LOGS:-false}
  AUTH_RATE_LIMIT_PER_MINUTE: ${AUTH_RATE_LIMIT_PER_MINUTE:-10}
  REDEEM_RATE_LIMIT_PER_MINUTE: ${REDEEM_RATE_LIMIT_PER_MINUTE:-20}
  STREAM_TOKEN_EXPIRE_SECONDS: ${STREAM_TOKEN_EXPIRE_SECONDS:-120}
  WORD_FORMATTER_ENABLED: ${WORD_FORMATTER_ENABLED:-false}
  MAX_UPLOAD_FILE_SIZE_MB: ${MAX_UPLOAD_FILE_SIZE_MB:-20}
  PDF_STRUCTURE_ENGINE: ${PDF_STRUCTURE_ENGINE:-mineru}
  PDF_STRUCTURE_FALLBACK_ENGINE: ${PDF_STRUCTURE_FALLBACK_ENGINE:-markitdown}
  MINERU_BASE_URL: ${MINERU_BASE_URL:-https://mineru.net}
  MINERU_MODEL_VERSION: ${MINERU_MODEL_VERSION:-vlm}
  MINERU_ENABLE_FORMULA: ${MINERU_ENABLE_FORMULA:-true}
  MINERU_ENABLE_TABLE: ${MINERU_ENABLE_TABLE:-true}
  MINERU_IS_OCR: ${MINERU_IS_OCR:-false}
  MINERU_LANGUAGE: ${MINERU_LANGUAGE:-ch}
  MINERU_TIMEOUT_SECONDS: ${MINERU_TIMEOUT_SECONDS:-300}
  MINERU_POLL_INTERVAL_SECONDS: ${MINERU_POLL_INTERVAL_SECONDS:-2.0}
  ZHUQUE_DETECT_TIMEOUT: ${ZHUQUE_DETECT_TIMEOUT:-180}
  ZHUQUE_DETECT_INTERVAL: ${ZHUQUE_DETECT_INTERVAL:-2}
  ZHUQUE_VISIBLE_CAPTCHA_WAIT_SECONDS: ${ZHUQUE_VISIBLE_CAPTCHA_WAIT_SECONDS:-600}
  ZHUQUE_DETECT_TRANSPORT: ${ZHUQUE_DETECT_TRANSPORT:-browser_agent}
  ZHUQUE_SERVER_HEADLESS_FALLBACK: ${ZHUQUE_SERVER_HEADLESS_FALLBACK:-false}
  ZHUQUE_BROWSER_AGENT_JOB_TIMEOUT: ${ZHUQUE_BROWSER_AGENT_JOB_TIMEOUT:-900}
  ZHUQUE_BROWSER_AGENT_HEARTBEAT_TIMEOUT: ${ZHUQUE_BROWSER_AGENT_HEARTBEAT_TIMEOUT:-120}
  ZHUQUE_BROWSER_AGENT_PAIRING_TTL_SECONDS: ${ZHUQUE_BROWSER_AGENT_PAIRING_TTL_SECONDS:-600}
  ZHUQUE_BROWSER_AGENT_LONG_POLL_SECONDS: ${ZHUQUE_BROWSER_AGENT_LONG_POLL_SECONDS:-25}
  ZHUQUE_DETECT_PERSISTENT_PROFILE: ${ZHUQUE_DETECT_PERSISTENT_PROFILE:-false}
  ZHUQUE_DETECT_AUTO_SYSTEM_BROWSER: ${ZHUQUE_DETECT_AUTO_SYSTEM_BROWSER:-true}
  ZHUQUE_DETECT_CDP_ENDPOINT: ${ZHUQUE_DETECT_CDP_ENDPOINT:-}
  ZHUQUE_DETECT_BROWSER_EXECUTABLE: ${ZHUQUE_DETECT_BROWSER_EXECUTABLE:-}
  ZHUQUE_DETECT_BROWSER_USER_DATA_DIR: ${ZHUQUE_DETECT_BROWSER_USER_DATA_DIR:-}
  ADMIN_DATABASE_MANAGER_ENABLED: ${ADMIN_DATABASE_MANAGER_ENABLED:-false}
  ADMIN_DATABASE_WRITE_ENABLED: ${ADMIN_DATABASE_WRITE_ENABLED:-false}
  INLINE_TASK_WORKER_ENABLED: "false"
  TASK_WORKER_POLL_INTERVAL: ${TASK_WORKER_POLL_INTERVAL:-2}
  TASK_WORKER_HEARTBEAT_INTERVAL: ${TASK_WORKER_HEARTBEAT_INTERVAL:-30}
  TASK_WORKER_STALE_TIMEOUT_SECONDS: ${TASK_WORKER_STALE_TIMEOUT_SECONDS:-120}
  TASK_WORKER_LEASE_TIMEOUT_SECONDS: ${TASK_WORKER_LEASE_TIMEOUT_SECONDS:-120}
  TASK_WORKER_MAX_ATTEMPTS: ${TASK_WORKER_MAX_ATTEMPTS:-3}
  TASK_EVENT_POLL_INTERVAL_SECONDS: ${TASK_EVENT_POLL_INTERVAL_SECONDS:-1}
  VPS_UPDATE_ENABLED: "false"

services:
  app:
    image: ${GANKAIGC_IMAGE:?set GANKAIGC_IMAGE to a signed ghcr.io image digest}
    build: null
    pull_policy: always
    env_file: !reset []
    environment:
      <<: *runtime-environment
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 9800
      AUTO_OPEN_BROWSER: "false"
      GANKAIGC_ENV_FILE: /app/config/runtime.env
      GANKAIGC_UPLOAD_ROOT: /app/state/uploads
      DATABASE_URL: ""
      DATABASE_URL_FILE: /run/secrets/database_url
      SECRET_KEY_FILE: /run/secrets/secret_key
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      POLISH_API_KEY_FILE: /run/secrets/polish_api_key
      ENHANCE_API_KEY_FILE: /run/secrets/enhance_api_key
      EMOTION_API_KEY_FILE: /run/secrets/emotion_api_key
      COMPRESSION_API_KEY_FILE: /run/secrets/compression_api_key
    volumes: !override
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}/.env.runtime
        target: /app/config/runtime.env
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}/backups
        target: /backups
        read_only: true
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}/package/uploads
        target: /app/state/uploads
    secrets:
      - source: app_database_url
        target: database_url
      - source: app_secret_key
        target: secret_key
      - source: app_admin_password
        target: admin_password
      - source: app_encryption_key
        target: encryption_key
      - source: openai_api_key
        target: openai_api_key
      - source: polish_api_key
        target: polish_api_key
      - source: enhance_api_key
        target: enhance_api_key
      - source: emotion_api_key
        target: emotion_api_key
      - source: compression_api_key
        target: compression_api_key

  worker:
    image: ${GANKAIGC_IMAGE:?set GANKAIGC_IMAGE to a signed ghcr.io image digest}
    build: null
    pull_policy: always
    env_file: !reset []
    environment:
      <<: *runtime-environment
      AUTO_OPEN_BROWSER: "false"
      GANKAIGC_ENV_FILE: /app/config/runtime.env
      GANKAIGC_HOST_PROJECT_DIR: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}
      DATABASE_URL: ""
      DATABASE_URL_FILE: /run/secrets/database_url
      SECRET_KEY_FILE: /run/secrets/secret_key
      ENCRYPTION_KEY_FILE: /run/secrets/encryption_key
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      POLISH_API_KEY_FILE: /run/secrets/polish_api_key
      ENHANCE_API_KEY_FILE: /run/secrets/enhance_api_key
      EMOTION_API_KEY_FILE: /run/secrets/emotion_api_key
      COMPRESSION_API_KEY_FILE: /run/secrets/compression_api_key
      TASK_WORKER_ID: ${TASK_WORKER_ID:-docker-worker-1}
    volumes: !override
      - type: bind
        source: ${GANKAIGC_HOST_PROJECT_DIR:-${PWD:-.}}/.env.runtime
        target: /app/config/runtime.env
        read_only: true
    secrets:
      - source: app_database_url
        target: database_url
      - source: app_secret_key
        target: secret_key
      - source: app_encryption_key
        target: encryption_key
      - source: openai_api_key
        target: openai_api_key
      - source: polish_api_key
        target: polish_api_key
      - source: enhance_api_key
        target: enhance_api_key
      - source: emotion_api_key
        target: emotion_api_key
      - source: compression_api_key
        target: compression_api_key

  migrate:
    image: ${GANKAIGC_IMAGE:?set GANKAIGC_IMAGE to a signed ghcr.io image digest}
    build: null
    pull_policy: always
    environment:
      APP_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
      DATABASE_URL: ""
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_SESSION_ROLE: ${POSTGRES_OWNER_ROLE:-gankaigc_owner}
    secrets:
      - source: migrator_database_url
        target: database_url

  postgres:
    image: ${POSTGRES_IMAGE:-${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}library/postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb}
    environment:
      POSTGRES_PASSWORD: ""
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - source: postgres_password
        target: postgres_password

  backup:
    image: ${POSTGRES_IMAGE:-${DOCKER_IMAGE_PREFIX:-docker.m.daocloud.io/}library/postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb}
    environment:
      POSTGRES_USER: ${POSTGRES_BACKUP_ROLE:-gankaigc_backup}
      POSTGRES_PASSWORD: ""
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - source: backup_password
        target: postgres_password

  backup-offsite:
    environment:
      RESTIC_PASSWORD: ""
      RESTIC_PASSWORD_FILE: /run/secrets/restic_password
    secrets:
      - source: restic_password
        target: restic_password

  provision-roles:
    image: ${GANKAIGC_IMAGE:?set GANKAIGC_IMAGE to a signed ghcr.io image digest}
    pull_policy: always
    profiles:
      - bootstrap
    user: "${GANKAIGC_RUNTIME_UID:-1000}:${GANKAIGC_RUNTIME_GID:-1000}"
    working_dir: /app/package/backend
    command: python provision_db_roles.py
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      POSTGRES_OWNER_ROLE: ${POSTGRES_OWNER_ROLE:-gankaigc_owner}
      POSTGRES_MIGRATOR_ROLE: ${POSTGRES_MIGRATOR_ROLE:-gankaigc_migrator}
      POSTGRES_APP_ROLE: ${POSTGRES_APP_ROLE:-gankaigc_app}
      POSTGRES_BACKUP_ROLE: ${POSTGRES_BACKUP_ROLE:-gankaigc_backup}
      POSTGRES_MIGRATOR_PASSWORD_FILE: /run/secrets/migrator_password
      POSTGRES_APP_PASSWORD_FILE: /run/secrets/app_password
      POSTGRES_BACKUP_PASSWORD_FILE: /run/secrets/backup_password
      POSTGRES_REASSIGN_EXISTING_OBJECTS: ${POSTGRES_REASSIGN_EXISTING_OBJECTS:-false}
    secrets:
      - source: bootstrap_database_url
        target: database_url
      - source: migrator_password
        target: migrator_password
      - source: app_password
        target: app_password
      - source: backup_password
        target: backup_password
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    restart: "no"

secrets:
  postgres_password:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/postgres_password
  bootstrap_database_url:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/bootstrap_database_url
  migrator_database_url:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/migrator_database_url
  app_database_url:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/app_database_url
  migrator_password:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/migrator_password
  app_password:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/app_password
  backup_password:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/backup_password
  app_secret_key:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/secret_key
  app_admin_password:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/admin_password
  app_encryption_key:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/encryption_key
  openai_api_key:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/openai_api_key
  polish_api_key:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/polish_api_key
  enhance_api_key:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/enhance_api_key
  emotion_api_key:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/emotion_api_key
  compression_api_key:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/compression_api_key
  restic_password:
    file: ${GANKAIGC_SECRETS_DIR:-./secrets}/restic_password
